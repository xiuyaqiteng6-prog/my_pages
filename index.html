<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr_saito's_Lab</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            flex-direction: column; /* 縦並び */
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        /* 背景画像：下からフェードイン */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=2072&auto=format&fit=crop') no-repeat center center/cover;
            z-index: -1;
            opacity: 0;
            animation: slideUpFade 2s ease-out forwards;
        }

        /* メインタイトル */
        .title {
            color: white;
            font-size: clamp(2rem, 8vw, 4rem); /* 画面幅に合わせて可変 */
            font-weight: bold;
            letter-spacing: 0.1em;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            opacity: 0;
            animation: fadeIn 1.5s ease-out 1s forwards;
            margin-bottom: 30px;
        }

        /* 回避プログラムボタン */
        .btn-bypass {
            opacity: 0;
            animation: fadeIn 1.5s ease-out 1.8s forwards; /* タイトルの後に表示 */
            padding: 15px 30px;
            font-size: 1.1rem;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50px;
            text-decoration: none;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-bypass:hover {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <h1 class="title">Dr_saito's_Lab</h1>
    
    <a href="youtube.html" class="btn-bypass">
        YouTubeフィルタリング回避プログラム
    </a>

</body>
</html>
