<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr_saito's_Lab</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 背景：宇宙の画像 */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=2072&auto=format&fit=crop') no-repeat center center/cover;
            z-index: -1;
            opacity: 0;
            animation: slideUpFade 2s ease-out forwards;
        }

        /* メインタイトル */
        .title {
            color: white;
            font-size: clamp(2.5rem, 10vw, 5rem);
            font-weight: bold;
            letter-spacing: 0.15em;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 0.8s forwards;
        }

        /* ボタンコンテナ */
        .nav-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 1.5s forwards;
        }

        /* 共通ボタン形式 */
        .nav-btn {
            padding: 15px 35px;
            font-size: 1.1rem;
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            text-decoration: none;
            backdrop-filter: blur(8px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* YouTube回避用（赤系） */
        .btn-youtube:hover {
            background: rgba(255, 0, 0, 0.2);
            border-color: #ff4d4d;
            box-shadow: 0 0 25px rgba(255, 77, 77, 0.5);
            transform: translateY(-5px);
        }

        /* AI Lab用（青緑系） */
        .btn-ai:hover {
            background: rgba(0, 255, 204, 0.15);
            border-color: #00ffcc;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.5);
            transform: translateY(-5px);
            color: #00ffcc;
        }

        /* Game System用（オレンジ系） */
        .btn-game:hover {
            background: rgba(255, 165, 0, 0.15);
            border-color: #ffa500;
            box-shadow: 0 0 25px rgba(255, 165, 0, 0.5);
            transform: translateY(-5px);
            color: #ffa500;
        }

        /* BGM動作状況（不可視に近いデバッグ表示） */
        #audio-monitor {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: rgba(255, 255, 255, 0.1);
            font-size: 0.6rem;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* スマホ対応 */
        @media (max-width: 600px) {
            .nav-container { flex-direction: column; width: 80%; }
            .nav-btn { text-align: center; }
        }
    </style>
</head>
<body>

    <div class="background"></div>
    
    <h1 class="title">Dr_saito's_Lab</h1>
    
    <div class="nav-container">
        <a href="youtube.html" class="nav-btn btn-youtube">
            YouTube回避プログラム
        </a>
        
        <a href="ai.html" class="nav-btn btn-ai">
            AI Lab (Learning System)
        </a>

        <a href="game.html" class="nav-btn btn-game">
            Multiplayer Game (Trade)
        </a>
    </div>

    <audio id="lab-bgm" loop src="/bgm.mp3"></audio>
    <div id="audio-monitor">AUDIO_SYSTEM: ACTIVE</div>

    <script>
        const bgm = document.getElementById('lab-bgm');
        bgm.volume = 0.4;

        // ブラウザ制限を突破して再生を開始する関数
        function startAudioSystem() {
            if (bgm.paused) {
                bgm.play().then(() => {
                    localStorage.setItem('lab_bgm_enabled', 'true');
                    document.getElementById('audio-monitor').innerText = "AUDIO_SYSTEM: PLAYING";
                }).catch(e => {
                    // クリックを待機中
                });
            }
        }

        // あらゆるユーザー操作をトリガーに音楽を開始
        window.addEventListener('mousedown', startAudioSystem);
        window.addEventListener('touchstart', startAudioSystem);
        window.addEventListener('keydown', startAudioSystem);

        // ページ読み込み時に既に権限がある場合は即再生
        window.addEventListener('load', () => {
            startAudioSystem();
            setTimeout(startAudioSystem, 500); // 安定化のための再試行
        });
    </script>

</body>
</html>
