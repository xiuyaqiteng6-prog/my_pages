<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saito_AI - Learning System</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; border-bottom: 1px solid #333; display: flex; flex-direction: column; }
        .msg { margin-bottom: 15px; padding: 12px 18px; border-radius: 15px; max-width: 80%; line-height: 1.5; font-size: 0.95rem; }
        .ai-msg { background: #1a3a3a; border-left: 4px solid #00ffcc; align-self: flex-start; box-shadow: 0 2px 10px rgba(0,255,204,0.1); }
        .user-msg { background: #333; align-self: flex-end; border-right: 4px solid #888; text-align: left; }
        .input-area { padding: 20px; background: #111; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; outline: none; }
        button { padding: 10px 20px; background: #00ffcc; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #000; transition: 0.2s; }
        button:hover { background: #00cca3; transform: scale(1.05); }
        .status { font-size: 0.7rem; color: #555; text-align: center; padding: 5px; }
    </style>
</head>
<body>

<div class="status" id="system-status">System Initializing...</div>
<div id="chat-box">
    <div class="msg ai-msg">Saito_AI 起動準備完了。</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="メッセージを入力、または「AはBだよ」と教えて...">
    <button onclick="sendMessage()">送信</button>
</div>

<script>
    let wordVectors = {}; // vectors.json
    let brain = {};       // knowledge.json

    // 1. 外部データのインポート (w2vベクトル & 基礎知識)
    async function initAI() {
        const status = document.getElementById('system-status');
        try {
            // vectors.jsonの読み込み
            const vecRes = await fetch('vectors.json');
            if (vecRes.ok) wordVectors = await vecRes.ok ? await vecRes.json() : {};

            // knowledge.jsonの読み込み
            const knoRes = await fetch('knowledge.json');
            if (knoRes.ok) brain = await knoRes.json();

            // ブラウザに保存されたユーザー学習データの追加
            const savedData = localStorage.getItem('ai_learning');
            if (savedData) {
                Object.assign(brain, JSON.parse(savedData));
            }

            status.innerText = "All Systems Online. Learning Data Loaded.";
            addMessage("基礎知能のインポートに成功しました。準備万端です！", 'ai-msg');
        } catch (e) {
            status.innerText = "Load Error. Running in standalone mode.";
            console.error(e);
        }
    }

    // 起動実行
    initAI();

    // 2. 類似度計算 (コサイン類似度)
    function getSimilarity(v1, v2) {
        if (!v1 || !v2 || v1.length !== v2.length) return 0;
        let dot = 0, m1 = 0, m2 = 0;
        for (let i = 0; i < v1.length; i++) {
            dot += v1[i] * v2[i];
            m1 += v1[i] ** 2;
            m2 += v2[i] ** 2;
        }
        return dot / (Math.sqrt(m1) * Math.sqrt(m2));
    }

    function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user-msg');
        processAI(text);
        input.value = '';
    }

    function processAI(text) {
        let response = "";
        
        // --- 学習モードの判定 ---
        if (text.includes("は") && (text.endsWith("だよ") || text.endsWith("です"))) {
            const parts = text.replace(/だよ|です/g, "").split("は");
            const key = parts[0].trim();
            const value = parts[1].trim();
            
            brain[key] = value;
            localStorage.setItem('ai_learning', JSON.stringify(brain));
            response = `「${key}」＝「${value}」ですね。覚えました！`;
        } 
        // --- 応答モードの判定 ---
        else {
            let bestMatch = text;
            let highestSim = -1;

            // 入力単語がベクトル辞書にあるか確認
            const inputVec = wordVectors[text];

            if (inputVec) {
                // 最も意味が近い既知語を検索
                for (let word in wordVectors) {
                    const sim = getSimilarity(inputVec, wordVectors[word]);
                    if (sim > highestSim) {
                        highestSim = sim;
                        bestMatch = word;
                    }
                }
            }

            // 類似度が0.8以上なら言い換えとして扱う
            const targetKey = (highestSim > 0.8) ? bestMatch : text;
            response = brain[targetKey] || "それはまだ知りません。私に「〇〇は××だよ」と教えてください。";
            
            if (highestSim > 0.8 && highestSim < 1.0) {
                console.log(`Bypass Analysis: ${text} -> ${bestMatch} (${Math.round(highestSim*100)}%)`);
            }
        }

        setTimeout(() => addMessage(response, 'ai-msg'), 500);
    }

    function addMessage(text, className) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${className}`;
        div.innerText = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
