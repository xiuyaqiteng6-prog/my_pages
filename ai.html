<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Saito_AI - Learning System</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; border-bottom: 1px solid #333; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 8px; max-width: 80%; line-height: 1.5; }
        .ai-msg { background: #1a3a3a; border-left: 4px solid #00ffcc; align-self: flex-start; }
        .user-msg { background: #333; margin-left: auto; border-right: 4px solid #888; text-align: right; }
        .input-area { padding: 20px; background: #111; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; outline: none; }
        button { padding: 10px 20px; background: #00ffcc; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: #000; }
        button:hover { background: #00cca3; }
    </style>
</head>
<body>

<div id="chat-box">
    <div class="msg ai-msg">システム起動中... 知識データをロードしています。</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="メッセージを入力、または「AはBだよ」と教えて...">
    <button onclick="sendMessage()">送信</button>
</div>

<script>
    let brain = {};

    // 外部の知識ファイルをインポートする関数
    async function importKnowledge() {
        try {
            // 同じディレクトリにあるknowledge.jsonを読み込む
            const response = await fetch('knowledge.json');
            if (response.ok) {
                const data = await response.json();
                Object.assign(brain, data); // 基礎知識をセット
                addMessage("基礎知識のインポートが完了しました。", 'ai-msg');
            }
        } catch (error) {
            console.error("知識の読み込みに失敗しました:", error);
        }

        // 以前にユーザーがブラウザで教えた内容も追加で読み込む
        const savedData = localStorage.getItem('ai_learning');
        if (savedData) {
            Object.assign(brain, JSON.parse(savedData));
        }
    }

    // 起動時にインポート実行
    importKnowledge();

    function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user-msg');
        processAI(text);
        input.value = '';
    }

    function processAI(text) {
        let response = "";

        // 学習モード：「〇〇は××だよ」
        if (text.includes("は") && (text.endsWith("だよ") || text.endsWith("です"))) {
            const parts = text.replace("だよ", "").replace("です", "").split("は");
            const key = parts[0].trim();
            const value = parts[1].trim();
            
            brain[key] = value;
            localStorage.setItem('ai_learning', JSON.stringify(brain));
            response = `「${key}」について「${value}」と学習しました！`;
        } 
        // 応答モード
        else {
            // 単語が含まれているか検索
            let foundKey = Object.keys(brain).find(key => text.includes(key));
            response = foundKey ? brain[foundKey] : "それはまだ知りません。「〇〇は××だよ」と教えてください。";
        }

        setTimeout(() => addMessage(response, 'ai-msg'), 500);
    }

    function addMessage(text, className) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${className}`;
        div.innerText = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
