<script>
    let brain = {};

    // 1. 外部データの読み込み (インポート)
    async function loadKnowledge() {
        try {
            // knowledge.jsonからデータを取得
            const response = await fetch('knowledge.json');
            const data = await response.json();
            
            // プリセット知識として統合
            Object.assign(brain, data);
            
            // 2. ユーザーが過去に教えた内容も統合
            const savedData = localStorage.getItem('ai_learning');
            if (savedData) {
                Object.assign(brain, JSON.parse(savedData));
            }
            console.log("学習データのインポート完了:", brain);
        } catch (e) {
            console.error("知識データの読み込みに失敗:", e);
        }
    }

    // ページ読み込み時に実行
    loadKnowledge();

    function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user-msg');
        processAI(text);
        input.value = '';
    }

    function processAI(text) {
        let response = "";

        // 学習モード：「AはBだよ」
        if (text.includes("は") && (text.endsWith("だよ") || text.endsWith("です"))) {
            const parts = text.replace("だよ", "").replace("です", "").split("は");
            const key = parts[0].trim();
            const value = parts[1].trim();
            
            brain[key] = value;
            localStorage.setItem('ai_learning', JSON.stringify(brain));
            response = `「${key}」について「${value}」と学習しました！`;
        } 
        // 質問モード（「〇〇は？」や「〇〇って何？」に対応）
        else {
            // 文章の中からキーワードを探す
            let foundKey = Object.keys(brain).find(key => text.includes(key));
            response = foundKey ? brain[foundKey] : "それはまだ知りません。「〇〇は××だよ」と教えてください。";
        }

        setTimeout(() => addMessage(response, 'ai-msg'), 500);
    }

    function addMessage(text, className) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${className}`;
        div.innerText = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
</script>
