<script>
    let wordVectors = {}; // 外部からインポートするw2vデータ
    let brain = {};       // knowledge.json（返答データ）

    // 1. 外部の学習済みモデル（基本単語ベクトル）をインポート
    async function initAI() {
        try {
            // 基本単語のベクトルデータをロード
            const vecRes = await fetch('vectors.json');
            wordVectors = await vecRes.json();
            
            // 基礎知識（返答）をロード
            const knoRes = await fetch('knowledge.json');
            brain = await knoRes.json();

            addMessage("基礎単語の学習データ（w2v）をロードしました。", 'ai-msg');
        } catch (e) {
            console.error("ロード失敗:", e);
        }
    }

    initAI();

    // 2. ベクトルの近さ（コサイン類似度）を計算する関数
    function calculateSimilarity(v1, v2) {
        let dotProduct = 0;
        let mag1 = 0;
        let mag2 = 0;
        for (let i = 0; i < v1.length; i++) {
            dotProduct += v1[i] * v2[i];
            mag1 += v1[i] ** 2;
            mag2 += v2[i] ** 2;
        }
        return dotProduct / (Math.sqrt(mag1) * Math.sqrt(mag2));
    }

    function processAI(text) {
        let bestMatch = null;
        let highestSim = -1;

        // 入力された単語のベクトルを取得
        const inputVec = wordVectors[text];

        if (inputVec) {
            // 全ての既知単語と比較して、一番「意味が近い」ものを探す
            for (let word in wordVectors) {
                const sim = calculateSimilarity(inputVec, wordVectors[word]);
                if (sim > highestSim) {
                    highestSim = sim;
                    bestMatch = word;
                }
            }
        }

        // 類似度が一定以上（例えば0.8以上）なら、その単語の回答を返す
        const responseKey = (highestSim > 0.8) ? bestMatch : text;
        const response = brain[responseKey] || "それはまだ知りません。";
        
        addMessage(response, 'ai-msg');
    }
</script>
