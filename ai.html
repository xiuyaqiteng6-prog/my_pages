<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saito_AI - Neural Engine</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Consolas', monospace; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 8px; max-width: 80%; line-height: 1.6; }
        .ai-msg { background: #1a2a2a; border-left: 4px solid #00ffcc; align-self: flex-start; }
        .user-msg { background: #333; align-self: flex-end; border-right: 4px solid #888; }
        .input-area { padding: 20px; background: #111; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; outline: none; }
        button { padding: 10px 20px; background: #00ffcc; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .status { font-size: 0.75rem; color: #00ffcc; text-align: center; background: #000; padding: 5px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="status" id="status">System Initializing...</div>
<div id="chat-box"></div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="メッセージを入力、または「AはBだよ」と教育...">
    <button onclick="sendMessage()">SEND</button>
</div>

<script>
    let wordVectors = {}; // vectors.json (知能の地図)
    let brain = {};       // knowledge.json (回答集)

    // 1. 外部データの自動インポート
    async function initAI() {
        const statusDisplay = document.getElementById('status');
        try {
            // 学習済みベクトルデータのロード
            const vecRes = await fetch('vectors.json');
            if (vecRes.ok) wordVectors = await vecRes.json();

            // 回答データのロード
            const knoRes = await fetch('knowledge.json');
            if (knoRes.ok) brain = await knoRes.json();

            // ローカル学習データのロード
            const saved = localStorage.getItem('ai_learning');
            if (saved) Object.assign(brain, JSON.parse(saved));

            statusDisplay.innerText = `ONLINE: ${Object.keys(wordVectors).length} words loaded.`;
            addMessage("システムオンライン。学習済みデータをインポートしました。", 'ai-msg');
        } catch (e) {
            statusDisplay.innerText = "OFFLINE: Load Error.";
            console.error(e);
        }
    }

    initAI();

    // 2. ベクトル間の「近さ」を計算 (コサイン類似度)
    function calculateSimilarity(v1, v2) {
        if (!v1 || !v2) return 0;
        let dotProduct = 0, mag1 = 0, mag2 = 0;
        for (let i = 0; i < v1.length; i++) {
            dotProduct += v1[i] * v2[i];
            mag1 += v1[i] ** 2;
            mag2 += v2[i] ** 2;
        }
        return dotProduct / (Math.sqrt(mag1) * Math.sqrt(mag2));
    }

    function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user-msg');
        processAI(text);
        input.value = '';
    }

    function processAI(text) {
        let response = "";

        // --- AはBだよ（学習モード） ---
        if (text.includes("は") && (text.endsWith("だよ") || text.endsWith("です"))) {
            const parts = text.replace(/だよ|です/g, "").split("は");
            const key = parts[0].trim();
            const value = parts[1].trim();
            brain[key] = value;
            localStorage.setItem('ai_learning', JSON.stringify(brain));
            response = `「${key}」の定義を「${value}」に更新しました。`;
        } 
        // --- 応答モード（ベクトル検索） ---
        else {
            let bestWord = null;
            let maxSim = -1;
            const inputVec = wordVectors[text];

            if (inputVec) {
                // インポートした全単語の中から最も意味が近いものを探す
                for (let word in wordVectors) {
                    const sim = calculateSimilarity(inputVec, wordVectors[word]);
                    if (sim > maxSim) {
                        maxSim = sim;
                        bestWord = word;
                    }
                }
            }

            // 最も近い単語(bestWord)に対する回答がbrainにあるか確認
            const targetKey = (maxSim > 0.8) ? bestWord : text;
            response = brain[targetKey] || `「${text}」についてはまだ詳しくありません。「${text}は〇〇だよ」と教えてください。`;
            
            if (maxSim > 0.8 && maxSim < 1.0) {
                console.log(`Bypass: ${text} -> ${bestWord} (${Math.round(maxSim*100)}%)`);
            }
        }

        setTimeout(() => addMessage(response, 'ai-msg'), 400);
    }

    function addMessage(text, className) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${className}`;
        div.innerText = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
