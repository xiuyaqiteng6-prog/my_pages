<script>
    function run() {
        let inputVal = document.getElementById('vid').value.trim();
        const p = document.getElementById('p');
        const log = document.getElementById('log');
        
        if(!inputVal) return;

        // URLからIDだけを抜く処理 (予備)
        if (inputVal.includes("v=")) {
            inputVal = inputVal.split("v=")[1].split("&")[0];
        } else if (inputVal.includes("youtu.be/")) {
            inputVal = inputVal.split("youtu.be/")[1].split("?")[0];
        }
        
        log.innerText = "Targeting Asset ID: " + inputVal + "\nRequesting raw stream...";
        
        // 自分のWorkerのパス。ブラウザには「ただの動画」と思わせる。
        p.src = `/assets/lib/core?id=${inputVal}`;
        p.load();
        p.play().catch(e => {
            log.innerText += "\nPlayback failed: " + e.message;
        });
    }
</script>
