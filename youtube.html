<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Saito_phD | Asset Stream Station</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: monospace; margin: 0; overflow: hidden; }
        .sidebar { position: fixed; left: 0; top: 0; width: 250px; height: 100%; background: #161b22; border-right: 1px solid #30363d; padding: 20px; box-sizing: border-box; z-index: 10; }
        .main-content { margin-left: 250px; height: 100vh; background: #000; }
        input { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 10px; margin-bottom: 10px; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background: #238636; color: #fff; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        iframe { width: 100%; height: 100%; border: none; }
        .desc { font-size: 0.7rem; color: #8b949e; margin-top: 20px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>[STREAM_DECODER]</h3>
    <input type="text" id="target-id" placeholder="Video ID...">
    <button onclick="launch()">GENERATE</button>
    
    <div class="desc">
        1. Input Video ID<br>
        2. Press GENERATE<br>
        3. Use the internal tool to stream or save assets.<br><br>
        *Bypassing YT-Auth-Guard...
    </div>
</div>

<div class="main-content">
    <iframe id="engine-frame" src="about:blank"></iframe>
</div>

<script>
    function launch() {
        const id = document.getElementById('target-id').value.trim();
        if(!id) return;
        
        // 解析ツールのURLに動画IDを付加してWorker経由で表示
        const bridgeUrl = `/assets/lib/core`;
        document.getElementById('engine-frame').src = bridgeUrl;
        
        // クリップボードにURLをコピー（ツール側に貼り付けやすくするため）
        const ytUrl = `https://www.youtube.com/watch?v=${id}`;
        navigator.clipboard.writeText(ytUrl).then(() => {
            alert("YouTube URL copied to clipboard! Paste it into the tool.");
        });
    }
</script>

</body>
</html>
