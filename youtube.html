<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bypass Redirect - Dr_saito's_Lab</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            text-align: center;
        }
        .btn-go {
            padding: 20px 40px;
            font-size: 1.5rem;
            color: #fff;
            background: #e60000;
            border: none;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(230, 0, 0, 0.5);
        }
        .msg { margin-bottom: 20px; color: #aaa; }
    </style>
</head>
<body>

    <p class="msg">フィルタリングを回避して接続中...</p>
    
    <a href="https://invidious.private.coffee/search" class="btn-go">
        YouTubeを表示する
    </a>

    <p style="margin-top: 30px; font-size: 0.8rem; color: #555;">
        ※自動で移動しない場合は上のボタンを押してください。
    </p>

    <script>
        // ページを開いて1秒後に自動で飛ばす（iframeを使わないのでブロックされにくい）
        setTimeout(function(){
            window.location.href = "https://inv.vern.cc/search";
        }, 1000);
    </script>

</body>
</html>
