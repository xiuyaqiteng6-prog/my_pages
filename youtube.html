<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Saito_phD | Media Console</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Consolas', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .terminal { width: 100%; max-width: 800px; border: 1px solid #00ff41; background: #000; border-radius: 4px; overflow: hidden; }
        .screen { width: 100%; aspect-ratio: 16/9; background: #111; display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; }
        .controls { padding: 20px; display: flex; gap: 10px; border-top: 1px solid #00ff41; }
        input { flex: 1; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; outline: none; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        #log { font-size: 0.75rem; padding: 0 20px 20px; color: #008f11; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="screen">
        <video id="v" controls playsinline></video>
    </div>
    <div class="controls">
        <input type="text" id="id" placeholder="ID/URL...">
        <button onclick="start()">LOAD</button>
    </div>
    <div id="log">READY.</div>
</div>

<script>
    function start() {
        let val = document.getElementById('id').value.trim();
        const v = document.getElementById('v');
        const log = document.getElementById('log');
        
        if(!val) return;
        
        log.innerText = "ACCESSING ASSET: " + val;
        
        // パスをセット
        v.src = `/assets/lib/core?id=${val}`;
        
        v.onloadstart = () => { log.innerText = "BUFFERING DATA..."; };
        v.oncanplay = () => { log.innerText = "DECODER_READY: STREAMING..."; v.play(); };
        v.onerror = () => {
            log.innerText = "FATAL: FAILED TO LOAD ASSET. (CHECK CONSOLE)";
            console.error(v.error);
        };

        v.load();
    }
</script>

</body>
</html>
