<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saito_phD | System Asset Console</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Consolas', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 300px; background: #161b22; border-right: 1px solid #30363d; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .main-viewer { flex-grow: 1; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        input { background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 10px; border-radius: 4px; outline: none; }
        button { background: #238636; color: #fff; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .log { font-size: 0.75rem; color: #8b949e; line-height: 1.6; border-top: 1px solid #30363d; padding-top: 15px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>[ASSET_DECODER]</h3>
    <p style="font-size: 0.8rem;">1. Copy YouTube URL<br>2. Press INITIATE<br>3. Paste & Play in viewer</p>
    <input type="text" id="target-id" placeholder="YouTube URL/ID...">
    <button onclick="initiate()">INITIATE BRIDGE</button>
    <div class="log" id="status-log">Status: Standby</div>
</div>

<div class="main-viewer">
    <iframe id="bridge-frame" src="about:blank"></iframe>
</div>

<script>
    function initiate() {
        const val = document.getElementById('target-id').value.trim();
        const frame = document.getElementById('bridge-frame');
        const log = document.getElementById('status-log');

        if(!val) return;

        // クリップボードにコピー（ツールに貼り付けやすくするため）
        let finalUrl = val;
        if(!val.includes("http")) finalUrl = "https://www.youtube.com/watch?v=" + val;
        
        navigator.clipboard.writeText(finalUrl);
        log.innerText = "Status: URL copied to clipboard.\nBridge routing active.";

        // Worker経由の「偽装パス」をロード
        // これにより、iframe内は drsaitolab.dpdns.org/assets... と認識される
        frame.src = "/assets/lib/core";
    }
</script>

</body>
</html>
