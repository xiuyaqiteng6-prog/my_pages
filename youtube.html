<script>
    function launch() {
        const id = document.getElementById('target-id').value.trim();
        if(!id) return;
        
        // 解析サイトを直接iframeに表示（Workerを介さない方が安定します）
        // 以下のURLは、パラメータを渡すだけで再生画面へ飛べる可能性があるサイトの例です
        const engineUrl = `https://corndog.io/`; // ← ここを学校で通るサイトに変えるのがコツです
        
        // もしCobaltを使いたいなら、Worker経由ではなく直接開く
        const cobaltUrl = `https://cobalt.tools/`;
        
        document.getElementById('engine-frame').src = cobaltUrl;
        
        // アラートを消して、ステータス欄に表示するだけにする
        console.log("System: Bridge initialized for ID " + id);
    }
</script>
