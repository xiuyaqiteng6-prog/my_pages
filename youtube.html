<div class="container">
    <h1>[LAB_STREAM_STATION]</h1>
    <video id="player" controls style="width:100%; border:1px solid #0f0;"></video>
    
    <div class="input-area">
        <input type="text" id="vid" placeholder="VIDEO_ID">
        <button onclick="startStream()">LOAD STREAM</button>
    </div>
</div>

<script>
function startStream() {
    const id = document.getElementById('vid').value;
    if(!id) return;
    // 自分のWorkerを動画の「ソース」に指定
    document.getElementById('player').src = `/proxy?v=${id}`;
    document.getElementById('player').play();
}
</script>
