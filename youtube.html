<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Stream Player</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; }
        input { width: 80%; padding: 10px; margin: 20px 0; border-radius: 5px; border: none; }
        video { width: 90%; max-width: 800px; border: 1px solid #333; }
        button { padding: 10px 20px; background: #00aaff; color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h3>YouTube Stream Bypass</h3>
    <input type="text" id="vid" placeholder="YouTubeの動画IDを入力 (例: dQw4w9WgXcQ)">
    <br>
    <button onclick="playVideo()">再生開始</button>
    <br><br>
    <video id="player" controls autoplay></video>

    <script>
        function playVideo() {
            const id = document.getElementById('vid').value;
            // ミラーサーバーから「動画データ本体」のみを抽出して再生
            // これにより、YouTubeのプレイヤー自体を読み込まないためブロックされにくい
            const streamUrl = "https://inv.tux.pizza/latest_version?id=" + id + "&itag=22";
            document.getElementById('player').src = streamUrl;
        }
    </script>
</body>
</html>
