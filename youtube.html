<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Saito_phD | System Asset Debugger</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; border: 1px solid #30363d; background: #161b22; border-radius: 8px; overflow: hidden; }
        .header { background: #21262d; padding: 10px; font-size: 0.8rem; color: #8b949e; border-bottom: 1px solid #30363d; }
        video { width: 100%; aspect-ratio: 16/9; background: #000; outline: none; }
        .input-box { padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 10px; border-radius: 4px; }
        button { background: #238636; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">STATUS: CONNECTED / SRC: ASSET_STREAM_v2</div>
    
    <video id="v-player" controls playsinline></video>

    <div class="input-box">
        <input type="text" id="asset-id" placeholder="Video ID (e.g. dQw4w9WgXcQ)">
        <button onclick="runDebug()">DECODE</button>
    </div>
</div>

<script>
    function runDebug() {
        const id = document.getElementById('asset-id').value.trim();
        if (!id) return;
        
        // 動画の読み込み開始
        const player = document.getElementById('v-player');
        player.src = `/assets/lib/core?id=${id}`;
        player.load();
        player.play();
    }
</script>

</body>
</html>
