<video id="v-player" controls playsinline>
    <source id="v-source" type="video/mp4">
</video>

<script>
    async function bootStream() {
        let val = document.getElementById('asset-id').value.trim();
        const player = document.getElementById('v-player');
        const source = document.getElementById('v-source');
        const log = document.getElementById('debug-log');
        
        if (!val) return;

        // ID抽出
        if (val.includes("v=")) val = val.split("v=")[1].split("&")[0];
        
        log.innerText = "Initializing sequence...\nTarget ID: " + val;

        // 偽装パスにタイムスタンプを付与（キャッシュによるtext/plain誤認を防止）
        const requestUrl = `/assets/lib/core?id=${val}&t=${Date.now()}`;
        
        source.src = requestUrl;
        player.load(); // ソースを再読み込み

        player.play().then(() => {
            log.innerText = "STREAM_ACTIVE: Decoder initialized.";
        }).catch(err => {
            log.innerText = "PLAY_ERROR: Check console for MIME issues.";
        });
    }
</script>
