<script>
    async function bootStream() {
        let val = document.getElementById('asset-id').value.trim();
        const player = document.getElementById('v-player');
        const log = document.getElementById('debug-log');
        
        if (!val) return;
        if (val.includes("v=")) val = val.split("v=")[1].split("&")[0];
        
        log.innerText = "Connecting to Secure Stream...";

        // 毎回異なるURLにすることでキャッシュによる停止を回避
        const requestUrl = `/assets/lib/core?id=${val}&nocache=${Math.random()}`;
        
        player.src = requestUrl;
        
        // タイムアウト監視
        const timeout = setTimeout(() => {
            if (player.readyState < 3) { // 3: HAVE_FUTURE_DATA
                log.innerText = "TIMEOUT: Reconnecting...";
                bootStream(); // 自動再試行
            }
        }, 10000); // 10秒待ってダメなら再起動

        player.onplaying = () => {
            clearTimeout(timeout);
            log.innerText = "STATUS: STREAMING_ACTIVE";
        };

        player.onerror = () => {
            log.innerText = "STALLED: Server dropped connection. Retrying...";
            setTimeout(bootStream, 2000);
        };

        player.load();
        try {
            await player.play();
        } catch (e) {
            log.innerText += "\nInteraction required to play.";
        }
    }
</script>
