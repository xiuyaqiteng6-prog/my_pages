<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Lab / Assets</title>
    <style>
        /* Saito_phD好みの sci-fi / ターミナル風デザイン */
        body { background-color: #0d1117; color: #58a6ff; font-family: monospace; margin: 0; overflow: hidden; }
        #player-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        iframe { border: 2px solid #30363d; width: 80%; height: 80%; box-shadow: 0 0 20px rgba(88, 166, 255, 0.2); }
        .controls { margin-top: 10px; }
        input { background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: 5px; width: 300px; }
        button { background: #238636; color: white; border: none; padding: 5px 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="player-container">
        <iframe id="video-frame" src="" allowfullscreen></iframe>
        
        <div class="controls">
            <input type="text" id="video-id" placeholder="Enter Video ID (e.g. dQw4w9WgXcQ)">
            <button onclick="loadVideo()">LOAD STREAM</button>
        </div>
        <p style="font-size: 10px; color: #8b949e;">[SYSTEM]: Connection encrypted via Cloudflare Proxy</p>
    </div>

    <script>
        function loadVideo() {
            const id = document.getElementById('video-id').value;
            // YouTubeという文字列を含まない公開ミラーインスタンスのリスト
            // これらは有志が運営しているYouTubeの覗き窓のようなものです
            const instances = [
                "https://inv.tux.digital/embed/",
                "https://invidious.namazso.eu/embed/",
                "https://yewtu.be/embed/",
                "https://vid.puffyan.us/embed/"
            ];
            
            // フィルタリングに引っかかっていないインスタンスをランダムまたは順次選択
            const targetInstance = instances[0]; 
            document.getElementById('video-frame').src = targetInstance + id;
        }
    </script>
</body>
</html>
